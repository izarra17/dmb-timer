<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#faf6f2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Денис">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>(( денис )) дмб</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="preload" href="fonts/Denistina.ttf?v=20" as="font" type="font/ttf" crossorigin>
  <style>
    @font-face {
      font-family: "Denistina";
      src: url("fonts/Denistina.ttf?v=20") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <link rel="stylesheet" href="css/style.css?v=20">
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    }
    if ("caches" in window) {
      caches.keys().then(function (keys) {
        keys.forEach(function (k) { caches.delete(k); });
      });
    }
  </script>
</head>
<body>
  <div class="bg-photo" aria-hidden="true"></div>
  <div class="bg-shade" aria-hidden="true"></div>

  <header class="header">
    <div class="header-center">
      <p class="header-tag">(( таймер ))</p>
      <h1 class="header-title" id="displayName">денис</h1>
    </div>
  </header>

  <main class="main">
    <section class="progress-section">
      <div class="progress-labels">
        <span>( прошло )</span>
        <span>( осталось )</span>
      </div>
      <div class="progress-bars" id="progressBars" aria-hidden="true"></div>

      <div class="display-tabs" role="tablist">
        <button type="button" class="display-tab active" data-mode="percent" role="tab">П</button>
        <button type="button" class="display-tab" data-mode="seconds" role="tab">С</button>
        <button type="button" class="display-tab" data-mode="months" role="tab">М</button>
        <button type="button" class="display-tab" data-mode="hours" role="tab">Ч</button>
      </div>

      <p class="main-value" id="mainValue">0,00%</p>
    </section>

    <div class="photo-space" aria-hidden="true"></div>

    <section class="stats-panel paper-card">
      <p class="stats-quote">а любовь стоит того, чтобы ждать</p>
      <div class="stats-grid">
        <div class="stats-col" id="elapsedCol"></div>
        <div class="stats-col stats-col--right" id="remainingCol"></div>
      </div>

      <div class="unit-tabs" role="tablist">
        <button type="button" class="unit-tab active" data-units="d" role="tab">Д</button>
        <button type="button" class="unit-tab" data-units="md" role="tab">МД</button>
        <button type="button" class="unit-tab" data-units="mnd" role="tab">МНД</button>
        <button type="button" class="unit-tab" data-units="nd" role="tab">НД</button>
      </div>
    </section>

    <section class="dates-row">
      <div class="date-chip paper-card">
        <span class="date-chip-label">( призыв )</span>
        <span class="date-chip-value" id="enlistmentShort">—</span>
      </div>
      <div class="date-chip paper-card paper-card--mint">
        <span class="date-chip-label">( присяга )</span>
        <span class="date-chip-value" id="oathShort">—</span>
      </div>
      <div class="date-chip paper-card paper-card--pink">
        <span class="date-chip-label">(( дембель ))</span>
        <span class="date-chip-value" id="dischargeShort">—</span>
      </div>
    </section>
  </main>

  <footer class="holiday-banner paper-card" id="holidayBanner">
    <span class="holiday-icon">✦</span>
    <span class="holiday-text" id="holidayText">загрузка…</span>
  </footer>

  <script src="js/app.js?v=20"></script>
</body>
</html>
