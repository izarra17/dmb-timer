<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Денис">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Денис — ДМБ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=5">
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    }
    if ("caches" in window) {
      caches.keys().then(function (keys) {
        keys.forEach(function (k) { caches.delete(k); });
      });
    }
  </script>
</head>
<body>
  <div class="bg-photo" aria-hidden="true"></div>
  <div class="bg-shade" aria-hidden="true"></div>

  <header class="header">
    <div class="header-spacer" aria-hidden="true"></div>
    <h1 class="header-title" id="displayName">Денис</h1>
    <button type="button" class="icon-btn" id="btnTogglePrivacy" aria-label="Скрыть цифры">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </header>

  <main class="main">
    <section class="progress-section">
      <div class="progress-labels">
        <span>прошло</span>
        <span>осталось</span>
      </div>
      <div class="progress-bars" id="progressBars" aria-hidden="true"></div>

      <div class="display-tabs" role="tablist">
        <button type="button" class="display-tab active" data-mode="percent" role="tab">П</button>
        <button type="button" class="display-tab" data-mode="seconds" role="tab">С</button>
        <button type="button" class="display-tab" data-mode="months" role="tab">М</button>
        <button type="button" class="display-tab" data-mode="hours" role="tab">Ч</button>
      </div>

      <p class="main-value" id="mainValue">0,000000%</p>
      <p class="seconds-line" id="secondsLine">0 секунд из 0</p>
    </section>

    <section class="stats-panel">
      <div class="stats-grid">
        <div class="stats-col" id="elapsedCol"></div>
        <div class="stats-col stats-col--right" id="remainingCol"></div>
      </div>

      <div class="unit-tabs" role="tablist">
        <button type="button" class="unit-tab" data-units="d" role="tab">Д</button>
        <button type="button" class="unit-tab" data-units="md" role="tab">МД</button>
        <button type="button" class="unit-tab active" data-units="mnd" role="tab">МНД</button>
        <button type="button" class="unit-tab" data-units="nd" role="tab">НД</button>
      </div>
    </section>

    <section class="dates-row">
      <div class="date-chip">
        <span class="date-chip-label">призыв</span>
        <span class="date-chip-value" id="enlistmentShort">—</span>
      </div>
      <div class="date-chip">
        <span class="date-chip-label">присяга</span>
        <span class="date-chip-value" id="oathShort">—</span>
      </div>
      <div class="date-chip date-chip--accent">
        <span class="date-chip-label">дембель</span>
        <span class="date-chip-value" id="dischargeShort">—</span>
      </div>
    </section>
  </main>

  <footer class="holiday-banner" id="holidayBanner">
    <span class="holiday-text" id="holidayText">загрузка…</span>
  </footer>

  <script src="js/app.js?v=5"></script>
</body>
</html>
